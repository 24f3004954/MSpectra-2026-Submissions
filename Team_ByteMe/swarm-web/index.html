<!DOCTYPE html>
<html>
<head>
  <title>Swarm Coordination Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT: CANVAS -->
  <div class="left">
    <canvas id="canvas"></canvas>
  </div>

  <!-- RIGHT: DASHBOARD -->
  <div class="right">

    <div class="card">
      <h2>System</h2>
      <div id="system"></div>
    </div>

    <div class="card">
      <h2>Agent</h2>
      <div id="agent"></div>
    </div>

    <div class="card">
      <h2>Metrics</h2>
      <div id="metrics"></div>
    </div>

    <div class="card">
      <h2>Communication</h2>
      <div id="messages"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
